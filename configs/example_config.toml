# ==============================================================================
# PyImageTrack Configuration File
# ==============================================================================
# This configuration file controls all parameters for the image tracking pipeline.
# Sections are organized in the order of the processing workflow.
#
# Workflow Overview:
# 1. Input Setup (paths, polygons, pairing)
# 2. Preprocessing (georeferencing, downsampling, image enhancement)
# 3. Alignment (co-registration of image pairs)
# 4. Tracking (movement detection)
# 5. Filtering (outlier removal)
# 6. Output (file saving options)
# ==============================================================================

# ==============================================================================
# SECTION 1: INPUT SETUP
# ==============================================================================
# Define input/output paths and how images are paired for processing.

[paths]
# Directory containing input hillshade images
# IMPORTANT: The input_folder and ALL its subdirectories are searched for images, CSVs, and shapefiles.
# Files can be organized in any subfolder structure within this directory.
# Duplicate filenames across different subfolders will cause an error.
input_folder = "/path/to/input/hillshades"

# Directory where all output files will be saved
output_folder = "/path/to/output/hillshades"

# Path to CSV file mapping abbreviated dates from image names to YYYY-MM-DD dates
# Searched recursively in input_folder and subdirectories. If not found there,
# an absolute path can be used. Cannot be in multiple locations.
# Format: year;date (e.g., "2018;2018-01-01")
# Can be set to "none" if the date is reflected in the filename
date_csv_path = "image_dates.csv"

# Path to CSV file defining custom image pairs
# Searched recursively in input_folder and subdirectories. If not found there,
# an absolute path can be used. Cannot be in multiple locations.
# Format: date_earlier;date_later (e.g., "2024_07;2025_06")
# Can be set to "none" if "all" or "successive" pairing mode is selected below
pairs_csv_path = "image_pairs.csv"

[polygons]
# Shapefile defining the stable area (no expected movement)
# Searched recursively in input_folder and subdirectories. If not found there,
# an absolute path can be used. Cannot be in multiple locations.
# Used for image alignment - stable areas provide reliable control points
# Can be set to "none" to use image_bounds minus moving_area as stable area
# (this assumes all areas outside the moving area are stable; alignment quality may be
#  slightly lower but can be improved by increasing number_of_control_points)
#
# NOTE: Wildcard pattern (*) is supported for batch processing mode.
# The * will be replaced with the identifier when processing in batch mode.
# Example: "stable_area_*.shp" will load "stable_area_9109.shp" for identifier "9109"
# Wildcard patterns are only valid when an identifier is provided (batch mode).
# Stable area shapefiles can contain one or multiple singlepart polygons; they are
# combined into one reference area for alignment.
stable_area_filename = "stable_area.shp"

# Shapefile defining the moving area (where movement is expected)
# Searched recursively in input_folder and subdirectories. If not found there,
# an absolute path can be used. Cannot be in multiple locations.
# Used to define the region of interest for tracking
#
# NOTE: Wildcard pattern (*) is supported for batch processing mode.
# The * will be replaced with the identifier when processing in batch mode.
# Example: "moving_area_*.shp" will load "moving_area_9109.shp" for identifier "9109"
# Wildcard patterns are only valid when an identifier is provided (batch mode).
# Moving area shapefiles can contain one or multiple singlepart polygons. Provide an
# ID column to split stats by polygon; missing IDs will be auto-filled with row indices.
moving_area_filename = "moving_area.shp"

# Name of the ID column in the moving-area shapefile. Default is "moving_id". If missing
# or empty for some polygons, IDs are filled with the polygon row index (as string) and a
# warning is issued. Stats/valid fractions are reported per ID.
moving_id_column = "moving_id"

[pairing]
# Strategy for pairing images for tracking:
# - "all": Pair each image with every other image (combinatorial)
# - "first_to_all": Pair the first image with all subsequent images
# - "successive": Pair consecutive images (1-2, 2-3, 3-4, ...)
# - "custom": Use pairs defined in image_pairs.csv
mode = "custom"

# ==============================================================================
# SECTION 2: PREPROCESSING
# ==============================================================================
# Settings for image preprocessing and enhancement.

[no_georef]
# Set to true ONLY when processing non-georeferenced images (e.g., JPG photos)
# For orthorectified images (GeoTIFF), keep this false
use_no_georeferencing = false

# Pixel size in CRS units when use_no_georeferencing = true
# Example: 1.0 means 1 pixel = 1 unit (meter/foot depending on CRS)
fake_pixel_size = 1.0

# Set to true to apply camera lens undistortion before tracking
# Requires camera calibration parameters
undistort_image = false
# In this case, the camera intrinsics matrix and the distortion coefficients are needed
camera_intrinsics_matrix = "none"
camera_distortion_coefficients = "none"
convert_to_3d_displacement = false
# If the positions should be transformed from the camera coordinate system to a different 3d coordinate system, specify
# the respective transform here
camera_to_3d_coordinates_transform = "none"

[downsampling]
# Downsample input images by this integer factor to speed up processing
# Higher values = faster processing but lower spatial resolution
# Recommended: 1 (no downsampling) for best accuracy, 2-4 for faster runs
downsample_factor = 1

[flags]
# Enable/disable processing steps
do_alignment = true      # Co-register image pairs
do_tracking = true       # Detect movement between images
do_filtering = true      # Remove outliers from tracking results

# Optional image enhancement via CLAHE (Contrast Limited Adaptive Histogram Equalization)
# Improves contrast in areas with low contrast (e.g., shadows)
do_image_enhancement = false

[image_enhancement]
# Enhancement type: "clahe", "none", or future types
type = "clahe"

# CLAHE-specific parameters (common defaults: kernel_size = 50, clip_limit = 0.9)
# kernel_size: Size of the grid for histogram equalization (larger = more global contrast)
# clip_limit: Contrast enhancement limit (higher = more contrast, but may amplify noise)
kernel_size = 50
clip_limit = 0.9

# ==============================================================================
# SECTION 3: ALIGNMENT
# ==============================================================================
# Parameters for co-registering image pairs (removing misalignment between images).
# This step ensures that apparent movement is due to actual ground movement,
# not camera/sensor misalignment.

[alignment]
# Number of control points to use for alignment
# More points = better alignment but slower processing
number_of_control_points = 50

# Search extent around each control point for finding the best match
# Format: [right, left, down, up] in pixels
# Example: [2, 2, 2, 2] searches 2 pixels in each direction
control_search_extent_px = [2, 2, 2, 2]

# Size of the control cell (template) for cross-correlation
# This value represents the side length of a square cell in pixels.
# Example: control_cell_size = 20 creates a 20x20 pixel cell (400 pixels total)
# Larger cells are more robust to noise but less sensitive to small displacements
control_cell_size = 50

# Minimum cross-correlation threshold for accepting a control point match
# Range: 0.0 to 1.0, higher = stricter matching
cross_correlation_threshold_alignment = 0.3

# Maximum allowed alignment displacement in pixels
# Used to filter out spurious control points
# Set to "none" to disable this filter
maximal_alignment_movement = "none"

# ==============================================================================
# SECTION 4: TRACKING
# ==============================================================================
# Parameters for detecting movement between aligned image pairs.

[tracking]
# Image band(s) to use for tracking (0 = first band, typically grayscale)
# For RGB images: 0=red, 1=green, 2=blue
image_bands = 0

# Distance between tracked points in pixels (grid spacing)
# Smaller values = more points but slower processing
distance_of_tracked_points_px = 100

# Size of the tracking cell (template) for cross-correlation
# Larger cells are more robust to noise but less sensitive to small movements
movement_cell_size = 100

# Minimum cross-correlation threshold for accepting a movement match
# Range: 0.0 to 1.0, lower = more permissive
cross_correlation_threshold_movement = 0.1

# Search extent around each tracked point for finding the best match
# Format: [right, left, down, up] in pixels
# This defines the maximum expected displacement between images
# Example: [5, 5, 5, 5] searches 5 pixels in each direction
search_extent_px = [5, 5, 5, 5]

# ==============================================================================
# SECTION 5: ADAPTIVE TRACKING WINDOW
# ==============================================================================
# Optional: Adjust search window based on expected movement rate.
# Useful when processing image pairs with different time intervals.

[adaptive_tracking_window]
# If true, the "search_extent_px" in tracking parameters relates to expected movement PER YEAR
# The actual search window is scaled by the number of years between images
# Example: If search_extent_px = [5, 5, 5, 5] and years_between = 2, the effective search window is [10, 10, 10, 10]
use_adaptive_tracking_window = false

# ==============================================================================
# SECTION 6: FILTERING
# ==============================================================================
# Parameters for removing outliers from tracking results.
# Multiple filters are applied sequentially.

[filter]
# Level of Detection (LoD) - minimum detectable movement threshold
# Quantile of movement magnitudes used to define the LoD
# Lower values = more conservative (fewer points pass)
level_of_detection_quantile = 0.5

# Number of points used to calculate the LoD
# Higher values = more robust but may miss small movements
number_of_points_for_level_of_detection = 50

# --- Movement Bearing Filters ---

# Maximum allowed difference from neighborhood median
# Compares each point's bearing to the median of its neighbors
# Range: 0-360 degrees, 360 = disabled
difference_movement_bearing_threshold = 360

# Window size for bearing difference filter (CRS units)
# Radius of circular neighborhood around each point (e.g., 500 = 500m radius)
# Larger = more neighbors, regional comparison; Smaller = fewer neighbors, local comparison
difference_movement_bearing_moving_window_size = 500

# Maximum allowed standard deviation of movement bearing in a window
# Filters all points in neighborhoods with inconsistent directions
# Range: 0-360 degrees, 360 = disabled
standard_deviation_movement_bearing_threshold = 360

# Window size for bearing standard deviation filter (CRS units)
# Radius of circular neighborhood for std dev calculation
# Larger = regional consistency; Smaller = local consistency
standard_deviation_movement_bearing_moving_window_size = 500

# --- Movement Rate Filters ---

# Maximum allowed difference from neighborhood median
# Compares each point's value to the median of its neighbors
# Units: CRS units per year
difference_movement_rate_threshold = 10

# Window size for rate difference filter (CRS units)
# Radius of circular neighborhood around each point (e.g., 10 = 10m radius)
# Larger = more neighbors, regional comparison; Smaller = fewer neighbors, local comparison
difference_movement_rate_moving_window_size = 10

# Modified Z-score threshold: filters individual points deviating from neighborhood median
# Uses median and MAD (Median Absolute Deviation) for robustness to outliers
# Common values: 2 or 3 (number of MADs, analog to std)
standard_deviation_movement_rate_threshold = 2

# Window size for rate standard deviation filter (CRS units)
# Radius of circular neighborhood for std dev calculation
# Larger = regional consistency; Smaller = local consistency
standard_deviation_movement_rate_moving_window_size = 50

# ==============================================================================
# SECTION 7: OUTPUT SETTINGS
# ==============================================================================
# Control what outputs are generated and how they are formatted.

[output]
# If true: additionally write a true-color aligned image
# Useful for visual inspection of alignment quality
write_truecolor_aligned = false

# If true: display interactive plots during processing (requires graphical display)
# Plots are always saved as JPG regardless of this setting
# Set to false for headless environments (e.g., servers, WSL without X11)
display_plots = false

[output_units]
# How movement rates are calculated:
# - "per_year": Movement rates normalized to per-year values (default for time-series)
# - "total": Raw displacement values without dividing by years between images
#   (useful for one-time events like landslides or single event monitoring)
mode = "per_year"

[cache]
# Enable caching to speed up re-runs with modified parameters
# Cache files are stored in the output folder
use_alignment_cache = true   # Cache alignment results
use_tracking_cache = true    # Cache tracking results
use_lod_cache = false         # Cache Level of Detection calculations

[save]
# List of output files to generate. Available options:
#
# Tracking results:
#   L0 GeoTiff (Raw):
#     "L0_movement-bearing_raw_tif"    - All tracked points, no filters applied
#     "L0_movement-rate_raw_tif"       - All tracked points, no filters applied
#
#   L1 GeoTiff (LoD-filtered):
#     "L1_movement-bearing_above-LoD_tif"    - Points above LoD threshold (includes outliers)
#     "L1_movement-rate_above-LoD_tif"       - Points above LoD threshold (includes outliers)
#
#   L2 GeoTiff (Valid):
#     "L2_movement-bearing_above-LoD_filtered_tif"    - Fully validated (above LoD AND no outliers)
#     "L2_movement-rate_above-LoD_filtered_tif"       - Fully validated (above LoD AND no outliers)
#
#   Other result outputs:
#     "tracking_results_fgb"        - Full tracking results per point (.fgb)
#     "tracking_results_figure_jpg" - Tracking visualization plot (.jpg)
#     "statistical_results_txt"     - Summary statistics (.txt)
#
# Diagnostics:
#   Mask GeoTiffs (show which points passed/failed each filter):
#     "mask_invalid_tif"            - Invalid points (failed cross-correlation)
#     "mask_LoD_tif"                - Points below Level of Detection
#     "mask_outlier_md_tif"         - Outliers by mean difference filter
#     "mask_outlier_msd_tif"        - Outliers by mean standard deviation filter
#     "mask_outlier_bd_tif"         - Outliers by bearing difference filter
#     "mask_outlier_bsd_tif"        - Outliers by bearing standard deviation filter
#   Other diagnostic outputs:
#     "parameters_txt"               - All configuration parameters (.txt)
#     "first_image_matrix_jpg"       - Raw first image matrix (.jpg)
#     "second_image_matrix_jpg"      - Raw second image matrix (.jpg)
#     "LoD_points_fgb"               - Level of Detection points (.fgb)
#     "alignment_points_fgb"         - Alignment control points (.fgb)
#
files = [
  "L0_movement-bearing_raw_tif",
  "L0_movement-rate_raw_tif",
  "L1_movement-bearing_above-LoD_tif",
  "L1_movement-rate_above-LoD_tif",
  "L2_movement-bearing_above-LoD_filtered_tif",
  "L2_movement-rate_above-LoD_filtered_tif",
  "mask_invalid_tif",
  "mask_LoD_tif",
  "mask_outlier_md_tif",
  "mask_outlier_msd_tif",
  "mask_outlier_bd_tif",
  "mask_outlier_bsd_tif",
  "tracking_results_fgb",
  "tracking_results_figure_jpg",
  "statistical_results_txt",
  "parameters_txt",
]
